syntax = "proto3";

package mdo.common.v1;

import "buf/validate/validate.proto";
import "google/api/field_behavior.proto";

// CursorPagination is the primary pagination mechanism for all list endpoints.
//
// Instead of using offset/limit (which becomes inefficient on large datasets),
// this uses a cursor – an opaque token that points to a specific position in
// the result set. Cursors are generated by the server and are not guessable.
//
// Advantages over offset/limit:
//   - O(1) performance even on large offsets (no skipped rows).
//   - Consistent results even when new items are inserted while paging.
//   - Prevents "page drift" when items are deleted during browsing.
//
// The cursor is a server‑generated token (e.g., base64‑encoded JSON)
// that encodes the last seen value of the sort field(s). The client MUST
// treat it as opaque.
//
// The default page_size is 25 if not specified.
message CursorPagination {
  // Maximum number of items to return per page.
  // Allowed range: 1‑100. Default: 25 (server‑side).
  uint32 page_size = 1 [
    (buf.validate.field).uint32 = {
      gte: 1
      lte: 100
    },
    (google.api.field_behavior) = OPTIONAL
  ];

  // Opaque cursor token from a previous response.
  // Empty (or not present) means "start from the beginning".
  string cursor = 2 [
    (buf.validate.field).string.max_len = 1024,
    (google.api.field_behavior) = OPTIONAL
  ];

  // Field to sort by.
  // MUST match one of the server‑side allowed sort fields.
  // Example: "created_at", "priority", "relevance".
  string sort_field = 3 [
    (buf.validate.field).string = {
      max_len: 64
      pattern: "^[a-z][a-z0-9_]*$"
    },
    (google.api.field_behavior) = OPTIONAL
  ];

  // Sort order. True = descending (newest first), False = ascending (oldest first).
  bool sort_desc = 4 [(google.api.field_behavior) = OPTIONAL];
}

// CursorPaginationResponse carries the paginated results and the next page token.
message CursorPaginationResponse {
  // Token to retrieve the next page. Empty if no more results.
  // The client should pass this in the next request's `cursor` field.
  string next_cursor = 1 [
    (buf.validate.field).string.max_len = 1024,
    (google.api.field_behavior) = OUTPUT_ONLY
  ];

  // Indicates whether there are more results after this page.
  // Useful for UI buttons ("Show more" / "Load next").
  bool has_more = 2 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Estimated total number of items matching the query.
  // This value is approximate and may be omitted if computing it would be
  // too expensive (e.g., large datasets).
  // Frontends can use it for progress bars or "X of Y" labels.
  optional uint64 total_estimate = 3 [(google.api.field_behavior) = OUTPUT_ONLY];
}

syntax = "proto3";

package mdo.common.v1;

import "buf/validate/validate.proto";
import "google/api/field_behavior.proto";
import "google/type/latlng.proto";

// LatLng represents a geographic point in the WGS84 coordinate system.
// It wraps the standard google.type.LatLng to add accuracy metadata.
message LatLng {
  // The underlying coordinates (latitude, longitude) in degrees.
  // Range: latitude [-90, 90], longitude: [-180, 180].
  google.type.LatLng coordinates = 1 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = REQUIRED
  ];

  // Accuracy of the location fix in meters.
  // - 0 means the location is considered exact (e.g., manual entry, verified GPS).
  // - >0 indicates the radius of uncertainty (GPS accuracy, network triangulation, etc.).
  // - For anonymous reports, this MUST be >= 500m (enforced by CEL).
  double accuracy_meters = 2 [
    (buf.validate.field).double = {
      gte: 0.0
      lte: 10000.0
    },
    (google.api.field_behavior) = REQUIRED
  ];
}

// GeoPoint extends LatLng with server-computed spatial indices for
// high-performance geospatial queries.
//
// The server is reponsible for deriving s2_cell_id, h3_cell_id, and geohash
// from the coordinates. Clients MUST NOT set these fields; they are OUTPUT_ONLY.
//
// Why two indices?
// - S2 (Google S2 geometry library): good for point-in-cell queries and
//   covering calculations. S2 cell ID is a 64-bit integer that represents
//   a hierarchial grid. Level 30 (~1 cm^2) is used for precise point lookups.
//
// - S3 (Uber H3): hexagonal hierarchical grid, excellent for aggregation,
//   heatmaps, and visualisation. Resolution 9 (~4 km^2) is ideal for province-level
//   dashboards and heatmaps.
//
// - Geohash: included for compatibility with external systems (Elasticsearch,
//   Dragonfly GEO, etc.). Base32 encoded, up to 12 characters.
message GeoPoint {
  // The geographic coordinates and accuracy.
  LatLng point = 1 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = REQUIRED
  ];

  // Source of the location fix (GPS, network, fused, manual).
  // Helps determine trustworthiness and accuracy expectations.
  enum Source {
    // Unspecified.
    SOURCE_UNSPECIFIED = 0;
    // GPS chip (high accuracy, typically < 10m).
    SOURCE_GPS = 1;
    // Wifi / cellular triangulation (moderate accuracy).
    SOURCE_NETWORK = 2;
    // Fused sensor data (Android/iOS fused location provider).
    SOURCE_FUSED = 3;
    // Manually entered by the user (accuracy often unknown or coarse).
    SOURCE_MANUAL = 4;
  }

  Source source = 2 [(google.api.field_behavior) = OPTIONAL];

  // S2 cell ID (64-bit) at level 30 (approx 1 cm^2).
  // Server-computed from coordinates. Do not send from the client.
  uint64 s2_cell_id = 3 [
    (buf.validate.field).uint64.gt = 0,
    (google.api.field_behavior) = OUTPUT_ONLY
  ];

  // H3 cell ID (64-bit) at resolution 9 (approx 4 km^2).
  // Server-computed from coordinates. Do not send from the client.
  uint64 h3_cell_id = 4 [
    (buf.validate.field).uint64.gt = 0,
    (google.api.field_behavior) = OUTPUT_ONLY
  ];

  // Geohash string (Base32, up to 12 characters) for compatibility.
  // Server-computed from coordinates. Do not send from the client.
  string geohash = 5 [
    (buf.validate.field).string = {
      max_len: 12
      pattern: "^[0-9b-hjkmnp-z]*$"
    },
    (google.api.field_behavior) = OUTPUT_ONLY
  ];
}

// BoundingBox defines a rectangular region using two corner points.
// Used for map viewport queries, spatial filtering, and bounding box searches.
//
// The box is defined by its south-west and north-east corners.
// The south-west corner MUST have a latitude less than the north-east corner.
// If the box crosses the antimeridian, use Viewport instead.
message BoundingBox {
  // South-west corner (minimum latitude, minimum longitude).
  GeoPoint south_west = 1 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = REQUIRED
  ];

  // North-east corner (maximum latitude, maximum longitude).
  GeoPoint north_east = 2 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = REQUIRED
  ];

  // Validate that the box is well-formed:
  // - south_west.latitude < north_east.latitude
  // - south_west.longitude < north_east.longitude (for non-antimeridian boxes)
  option (buf.validate.message).cel = {
    id: "bounding_box.valid"
    message: "south_west.latitude must be less than north_east.latitude"
    expression: "this.south_west.point.coordinates.latitude < this.north_east.point.coordinates.latitude"
  };
}

// Viewport: todo!
message Viewport {}

// Address: todo!
message Address {}

syntax = "proto3";

package mdo.common.v1;

import "buf/validate/validate.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/timestamp.proto";

// AuditMetadata provides:
//   1. Temporal tracking (create, update, delete timestamps)
//   2. Optimistic Concurrency Control (OCC) via `version`
//   3. HTTP caching semantics via `etag`
//   4. Internal actor tracking via `created_by` / `updated_by` / `deleted_by`
//      (opaque UUIDs, NOT PII – never exposed to public clients)
//   5. Soft-delete support via `delete_time`
//   6. Distributed tracing correlation via `traceparent` (W3C Trace Context)
//
// This message is embedded in EVERY root aggregate (Report, Campaign, Donation, etc.)
// It is server-authoritative: clients MUST NOT set these fields.
//
// SECURITY WARNING:
//   - `created_by`, `updated_by`, `deleted_by` are opaque UUIDs that point to an
//     internal identity service. They are NOT PII, but they ARE correlation IDs.
//     They MUST NOT be returned in public API responses (e.g., lists, public views).
//     Use CQRS projections (ReportCard) that exclude these fields.
//   - `traceparent` is set by the server from incoming traceparent headers.
//     It is used for distributed tracing and debugging, never exposed publicly.
message AuditMetadata {
  // Creation timestamp (server-side, nanosecond precision).
  google.protobuf.Timestamp create_time = 1 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = OUTPUT_ONLY
  ];

  // Last update timestamp (server-side).
  google.protobuf.Timestamp update_time = 2 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = OUTPUT_ONLY
  ];

  // Soft-delete timestamp. If present, the record is logically deleted.
  // Queries MUST filter out records where delete_time IS NOT NULL
  // unless explicitly requesting deleted records (e.g., admin restore).
  google.protobuf.Timestamp delete_time = 3 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Version number for Optimistic Concurrency Control (OCC).
  // - Starts at 0 on creation.
  // - Incremented by 1 on every successful update.
  // - The client sends the current version in update requests.
  // - The server rejects the update if the version does not match
  //   (returns FAILED_PRECONDITION).
  //
  // Why not use `update_time` for OCC?
  //   - Timestamps have precision limitations (milliseconds vs nanoseconds).
  //   - Version is an integer, which is exact and simple to compare.
  int64 version = 4 [
    (buf.validate.field).int64.gte = 0,
    (google.api.field_behavior) = OUTPUT_ONLY
  ];

  // Entity Tag (ETag) for HTTP caching (RFC 7232).
  // Derived from a hash of (version + update_time + resource_id).
  // Used in:
  //   - If-Match: conditional updates (prevent lost updates).
  //   - If-None-Match: conditional GETs (cache validation).
  //
  // The server computes this; clients should treat it as opaque.
  // Format: base64url-encoded SHA-256 (32 bytes → 43 chars).
  string etag = 5 [
    (buf.validate.field).string.max_len = 64,
    (google.api.field_behavior) = OUTPUT_ONLY
  ];

  // Opaque internal identifier of the actor who created the record.
  // This is an UUID that references the internal identity service.
  // It is NOT the user's email, phone, or any personally identifiable information.
  // - If the record was created by a system process, this may be empty.
  // - For anonymous reports, this is the ID of the session, not the user.
  string created_by = 6 [
    (buf.validate.field).string.uuid = true,
    (google.api.field_behavior) = OUTPUT_ONLY
  ];

  // Opaque internal identifier of the actor who last updated the record.
  // Same security constraints as `created_by`.
  string updated_by = 7 [
    (buf.validate.field).string.uuid = true,
    (google.api.field_behavior) = OUTPUT_ONLY
  ];

  // Optional metadata about the delete operation.
  // Populated when delete_time is set.
  message DeleteInfo {
    // Reason for deletion (e.g., "user_request", "admin_action", "spam").
    // Limited to predefined values validated server-side.
    string reason = 1 [
      (buf.validate.field).string = {max_len: 100},
      (google.api.field_behavior) = OUTPUT_ONLY
    ];

    // Actor who performed the deletion (opaque UUID).
    // Same security constraints as `created_by`.
    string deleted_by = 2 [
      (buf.validate.field).string.uuid = true,
      (google.api.field_behavior) = OUTPUT_ONLY
    ];
  }
  DeleteInfo delete_info = 8 [(google.api.field_behavior) = OUTPUT_ONLY];

  // W3C Trace Context header (traceparent) for distributed tracing.
  // Format: "00-trace_id-span_id-flags" where:
  //    - version: 2 hex chars (always "00")
  //    - trace_id: 32 hex chars (16 bytes)
  //    - span_id: 16 hex chars (8 bytes)
  //    - flags: 2 hex chars (1 byte)
  // Example: "00-0af7651916cd43dd8448eb211c80319c-b9c7c989f97918e1-01"
  //
  // The server extracts this from the incoming traceparent header.
  // It is used for internal correlation and debugging.
  string traceparent = 9 [
    (buf.validate.field).string = {
      pattern: "^00-[0-9a-f]{32}-[0-9a-f]{16}-[0-9a-f]{2}$"
      max_len: 55
    },
    (google.api.field_behavior) = OUTPUT_ONLY
  ];

  // Validate that delete_info is present iff delete_time is set.
  option (buf.validate.message).cel = {
    id: "audit.delete_info_consistent"
    message: "delete_info must be present when delete_time is set, and absent otherwise"
    expression: "has(this.delete_time) == has(this.delete_info)"
  };
}
